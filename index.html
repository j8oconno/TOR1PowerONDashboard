<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ASCENT TOR1 — SLD Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#16a34a;--green-mid:#22c55e;--green-dim:#f0fdf4;--green-border:#bbf7d0;--green-wire:rgba(22,163,74,0.45);
  --amber:#d97706;--amber-dim:#fffbeb;--amber-border:#fde68a;
  --red:#dc2626;--red-dim:#fef2f2;--red-border:#fecaca;
  --bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--bg4:#e2e8f0;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#334155;--text3:#64748b;--text4:#94a3b8;
  --shadow-sm:0 1px 3px rgba(15,23,42,0.08),0 1px 2px rgba(15,23,42,0.05);
  --shadow:0 4px 12px rgba(15,23,42,0.08),0 2px 4px rgba(15,23,42,0.04);
  font-family:'Inter',system-ui,sans-serif;
}
html,body,#root{height:100%;background:var(--bg);color:var(--text)}
#root{display:flex;flex-direction:column;overflow:hidden}
button{cursor:pointer;font-family:inherit;background:none;border:none;color:inherit}
button:focus-visible{outline:2px solid var(--green);outline-offset:2px}
.scrollable{overflow:auto}
.scrollable::-webkit-scrollbar{width:5px;height:5px}
.scrollable::-webkit-scrollbar-track{background:transparent}
.scrollable::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}
.pulse{animation:pulse 2.4s ease-in-out infinite}

/* NODE */
.node{position:relative;display:flex;flex-direction:column;align-items:center;gap:4px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);padding:8px 10px;min-width:80px;box-shadow:var(--shadow-sm);transition:border-color 0.25s,background 0.25s,box-shadow 0.2s,transform 0.1s}
.node:hover{transform:translateY(-1px) scale(1.03);box-shadow:var(--shadow)}
.node:active{transform:scale(0.97)}
.node.energized{border-color:var(--green-border);background:var(--green-dim)}
.node.warm{border-color:var(--amber-border);background:var(--amber-dim)}
.node.compact{min-width:62px;padding:6px 8px}
.node-dot{position:absolute;top:-4px;right:-4px;width:8px;height:8px;border-radius:50%;background:var(--border2);border:1.5px solid white}
.node-dot.energized{background:var(--green-mid)}
.node-dot.warm{background:var(--amber)}
.node-icon{width:15px;height:15px;color:var(--text4);flex-shrink:0}
.node.energized .node-icon{color:var(--green)}
.node.warm .node-icon{color:var(--amber)}
.node-label{font-family:'JetBrains Mono',monospace;font-size:9px;text-align:center;color:var(--text3);line-height:1.3}
.node.energized .node-label{color:var(--text2)}
.node-state{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:600;letter-spacing:0.05em}
.node-state.closed{color:var(--green)}
.node-state.open{color:var(--red)}

/* WIRES */
.wire-v{width:1px;background:var(--border2);transition:background 0.3s;flex-shrink:0}
.wire-v.on{background:var(--green-wire)}
.wire-h{height:1px;background:var(--border2);transition:background 0.3s}
.wire-h.on{background:var(--green-wire)}
.bus-h{height:2px;border-radius:1px;transition:background 0.3s;align-self:stretch}
.bus-h.on{background:var(--green-wire)}
.bus-h.off{background:var(--border2)}
.branch{display:flex;flex-direction:column;align-items:center}
.branch-cell{display:flex;flex-direction:column;align-items:center}
.kirk-label{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:600;color:var(--amber);letter-spacing:0.12em;margin-bottom:3px;white-space:nowrap;text-transform:uppercase}
.kirk-box{border:1.5px dashed var(--amber-border);border-radius:8px;padding:3px;background:var(--amber-dim)}

/* NAVBAR */
.navbar{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-logo{width:28px;height:28px;border-radius:7px;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-logo svg{color:white;width:15px;height:15px}
.nav-title{font-weight:700;font-size:14px;letter-spacing:-0.01em}
.nav-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text4);padding:2px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:4px}
.nav-tabs{display:flex;gap:2px}
.nav-tab{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--text3);transition:all 0.15s}
.nav-tab:hover{color:var(--text);background:var(--bg3)}
.nav-tab.active{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.nav-tab svg{width:13px;height:13px}

/* BLOCK DIAGRAM HEADER */
.block-header{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:52px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.block-header-left{display:flex;align-items:center;gap:12px}
.block-header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn-back{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--text3);padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);transition:all 0.15s}
.btn-back:hover{color:var(--text);background:var(--bg3)}
.divider-v{width:1px;height:22px;background:var(--border)}
.badge{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;border:1px solid;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500}
.badge.green{border-color:var(--green-border);color:var(--green);background:var(--green-dim)}
.badge.amber{border-color:var(--amber-border);color:var(--amber);background:var(--amber-dim)}
.utd-toggle{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:4px 9px;border-radius:6px;border:1px solid;transition:all 0.2s}
.utd-toggle.on{border-color:var(--green-border);color:var(--green);background:var(--green-dim)}
.utd-toggle.off{border-color:var(--red-border);color:var(--red);background:var(--red-dim)}
.btn-nav{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:4px 9px;border-radius:6px;border:1px solid var(--border);color:var(--text3);background:var(--bg2);transition:all 0.15s}
.btn-nav:hover{color:var(--text);background:var(--bg3)}

/* DASHBOARD */
.page{padding:28px 28px 40px}
.section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.1em;color:var(--text4);margin-bottom:10px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:18px;box-shadow:var(--shadow-sm)}
.stat-label{font-size:11px;font-weight:500;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:30px;font-weight:700;letter-spacing:-0.02em}
.block-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px}
.block-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:7px;text-align:left;transition:all 0.18s;box-shadow:var(--shadow-sm)}
.block-card:hover{border-color:var(--border2);box-shadow:var(--shadow);transform:translateY(-1px)}
.block-card-top{display:flex;align-items:center;justify-content:space-between}
.block-card-id{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text);transition:color 0.15s}
.block-card:hover .block-card-id{color:var(--green)}
.block-card-src{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px}
.block-card-src.util{background:var(--green-dim);color:var(--green)}
.block-card-src.gen{background:var(--amber-dim);color:var(--amber)}
.block-card-pct{font-size:24px;font-weight:700;letter-spacing:-0.02em}
.block-card-ratio{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text4)}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 0.5s,background-color 0.4s}
.block-card-utd{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text4)}

/* UTD BAR */
.utd-bar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.utd-chip{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:8px;border:1px solid;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;transition:all 0.18s;box-shadow:var(--shadow-sm)}
.utd-chip.on{border-color:var(--green-border);background:var(--green-dim);color:var(--green)}
.utd-chip.off{border-color:var(--red-border);background:var(--red-dim);color:var(--red)}
.utd-dot{width:7px;height:7px;border-radius:50%}
.utd-chip.on .utd-dot{background:var(--green-mid)}
.utd-chip.off .utd-dot{background:var(--red)}
.utd-rating{font-size:9px;color:var(--text4)}
.utd-status-badge{font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;letter-spacing:0.05em}
.utd-chip.on .utd-status-badge{background:var(--green-border);color:var(--green)}
.utd-chip.off .utd-status-badge{background:var(--red-border);color:var(--red)}

/* CARDS */
.mv-feed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.mv-section-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.mv-chain-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:8px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;box-shadow:var(--shadow-sm)}
.card.active{border-color:var(--border)}
.card.future{opacity:0.5}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.tag{font-size:9px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:0.04em}
.tag.active{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border)}
.tag.future{background:var(--bg3);color:var(--text4);border:1px solid var(--border)}
.tag.feeder{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}
.card-rating{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:4px}
.card-note{font-size:11px;color:var(--text4);line-height:1.4}
.card-blocks{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
.block-link{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:3px 8px;border-radius:5px;background:var(--bg3);color:var(--green);border:1px solid var(--green-border);transition:all 0.15s}
.block-link:hover{background:var(--green-dim)}
.chain-blocks{display:flex;align-items:center;gap:4px;flex-wrap:wrap;margin:9px 0 5px}
.chain-arrow{color:var(--text4);font-size:11px}
.chain-block{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;padding:3px 8px;border-radius:5px;background:var(--bg3);color:var(--text2);border:1px solid var(--border);transition:all 0.15s}
.chain-block:hover{color:var(--green);border-color:var(--green-border);background:var(--green-dim)}

/* DIAGRAM */
.diagram-wrap{flex:1;overflow:auto;padding:32px;background:var(--bg)}
.diagram-inner{display:flex;flex-direction:column;align-items:center;min-width:max-content;margin:0 auto}
.sources-row{display:flex;align-items:flex-start;gap:80px;margin-bottom:4px}
.source-col{display:flex;flex-direction:column;align-items:center;gap:6px}
.source-label{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.12em;color:var(--text4)}
.diagram-wrap::-webkit-scrollbar{width:5px;height:5px}
.diagram-wrap::-webkit-scrollbar-track{background:transparent}
.diagram-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.ats-btn{display:flex;align-items:center;gap:8px;padding:7px 14px;border-radius:7px;border:1px solid;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;transition:all 0.2s;box-shadow:var(--shadow-sm)}
.ats-btn.util{border-color:var(--green-border);color:var(--green);background:var(--green-dim)}
.ats-btn.gen{border-color:var(--amber-border);color:var(--amber);background:var(--amber-dim)}
.ats-hint{font-size:9px;color:var(--text4);font-style:italic}

/* TOOLTIP */
.tip-wrap{position:relative;display:inline-block}
.tip-box{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);z-index:200;background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 12px;width:168px;pointer-events:none;box-shadow:var(--shadow)}
.tip-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.tip-type{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text4);text-transform:uppercase;letter-spacing:0.06em}
.tip-rating{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--text3);margin-top:3px}
.tip-state{display:flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;font-weight:500}
.tip-state.energized{color:var(--green)}
.tip-state.dead{color:var(--text4)}
.legend{display:flex;align-items:center;gap:14px;font-size:11px;color:var(--text3)}
.legend-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px}

/* DASHBOARD HEADER */
.dash-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px}
.dash-title{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.dash-sub{font-size:13px;color:var(--text3);margin-top:4px}
.dash-pct-big{font-size:40px;font-weight:700;letter-spacing:-0.03em;color:var(--green);line-height:1}
.dash-pct-sub{font-size:11px;color:var(--text4);text-align:right;margin-top:4px}
.mv-header{margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.mv-title{font-size:22px;font-weight:700;letter-spacing:-0.02em}
.mv-sub{font-size:13px;color:var(--text3);margin-top:4px}

/* CHANGELOG MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;background:rgba(15,23,42,0.4);display:flex;align-items:center;justify-content:center}
.modal-box{background:white;border-radius:14px;width:95vw;max-width:820px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(15,23,42,0.18);overflow:hidden}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-body{flex:1;overflow:auto}
.modal-body::-webkit-scrollbar{width:5px}
.modal-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.log-table{width:100%;border-collapse:collapse;font-size:11px}
.log-table thead tr{background:var(--bg3);border-bottom:1px solid var(--border);position:sticky;top:0}
.log-table th{padding:7px 12px;text-align:left;font-weight:600;color:var(--text3);font-size:10px;letter-spacing:0.04em;text-transform:uppercase;white-space:nowrap}
.log-table tbody tr{border-bottom:1px solid var(--bg3)}
.log-table tbody tr:hover{background:var(--bg3)}
.log-table td{padding:6px 12px;font-family:'JetBrains Mono',monospace;font-size:10px}

/* DEVELOPER CREDIT */
.dev-credit{position:fixed;bottom:16px;right:20px;pointer-events:none;z-index:10}
.dev-credit-inner{font-family:'JetBrains Mono',monospace;font-size:9.5px;background:rgba(255,255,255,0.9);border:1px solid var(--border);border-radius:7px;padding:6px 12px;text-align:right;line-height:1.7}

@media(max-width:640px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .block-grid{grid-template-columns:repeat(2,1fr)}
  .mv-feed-grid{grid-template-columns:1fr 1fr}
  .page{padding:16px}
  .navbar{padding:0 12px}
  .nav-sub{display:none}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo, useRef } = React;

// ═══════════════════════════════════════════════════════════════════
// DATA — verified against MV SLD image + Phase 2/3 single line PDFs
// ═══════════════════════════════════════════════════════════════════
// MV Topology:
//   UT-1 (existing) → UTA1-1, UTA1-2, UTB1-1, UTB1-2  (Phase 1 + 12A-12D)
//   UT-2 (Grandbridge new) → UTD2-1 ↔ UTD2-2           (Phase 2: 11A-11J)
//   UT-3 (Grandbridge new) → UTD3-1 ↔ UTD3-2           (Phase 3: 12E-12N)
//   UT-4 (future)          → UTD4-1                     (N+1)

const BLOCKS_11 = ['11A','11B','11C','11D','11E','11F','11G','11H','11I','11J'];
const BLOCKS_12 = ['12A','12B','12C','12D','12E','12F','12G','12H','12I','12J','12K','12L','12M','12N'];
const BLOCKS = [...BLOCKS_11,...BLOCKS_12];

// Ring backfeed: both UTDs must fail to kill any block in the ring
const BLOCK_UTD_RING = {
  '11A':['UTD2-1','UTD2-2'],'11B':['UTD2-1','UTD2-2'],'11C':['UTD2-1','UTD2-2'],
  '11D':['UTD2-1','UTD2-2'],'11E':['UTD2-1','UTD2-2'],'11F':['UTD2-1','UTD2-2'],
  '11G':['UTD2-1','UTD2-2'],'11H':['UTD2-1','UTD2-2'],'11I':['UTD2-1','UTD2-2'],'11J':['UTD2-1','UTD2-2'],
  '12A':['UTA1-2','UTB1-2'],'12B':['UTA1-2','UTB1-2'],'12C':['UTA1-2','UTB1-2'],'12D':['UTA1-2','UTB1-2'],
  '12E':['UTD3-1','UTD3-2'],'12F':['UTD3-1','UTD3-2'],'12G':['UTD3-1','UTD3-2'],
  '12H':['UTD3-1','UTD3-2'],'12I':['UTD3-1','UTD3-2'],'12J':['UTD3-1','UTD3-2'],
  '12K':['UTD3-1','UTD3-2'],'12L':['UTD3-1','UTD3-2'],'12M':['UTD3-1','UTD3-2'],'12N':['UTD3-1','UTD3-2'],
};

// Primary source label for each unit (ring-end units show their actual feed direction)
const BLOCK_UTD_SOURCE = {
  '11A':'UTD2-1','11B':'UTD2-1','11C':'UTD2-2',
  '11D':'UTD2-1','11E':'UTD2-1','11F':'UTD2-1','11G':'UTD2-2',
  '11H':'UTD2-1','11I':'UTD2-1','11J':'UTD2-2',
  '12A':'UTA1-2','12B':'UTA1-2','12C':'UTA1-2','12D':'UTB1-2',
  '12E':'UTD3-1','12F':'UTD3-1','12G':'UTD3-2',
  '12H':'UTD3-1','12I':'UTD3-1','12J':'UTD3-2',
  '12K':'UTD3-1','12L':'UTD3-1','12M':'UTD3-1','12N':'UTD3-2',
};

const UTD_LOOPS = [
  { id:'UTD2-1', label:'UTD2-1', rating:'1200A 38kV 25KAIC', feeder:'11', utilFeed:'UT-2', note:'Fed from UT-2 (Grandbridge). Primary for chains 11A, 11D, 11H' },
  { id:'UTD2-2', label:'UTD2-2', rating:'1200A 38kV 25KAIC', feeder:'11', utilFeed:'UT-2', note:'Fed from UT-2 (Grandbridge). Ring backfeed for 11C, 11G, 11J' },
  { id:'UTA1-2', label:'UTA1-2', rating:'600A 38kV 25KAIC',  feeder:'12', utilFeed:'UT-1', note:'Fed from UT-1 (existing). Primary for chain 12A-12B-12C-12D' },
  { id:'UTB1-2', label:'UTB1-2', rating:'600A 38kV 25KAIC',  feeder:'12', utilFeed:'UT-1', note:'Fed from UT-1 (existing). Ring backfeed for 12D chain' },
  { id:'UTD3-1', label:'UTD3-1', rating:'1200A 38kV 25KAIC', feeder:'12', utilFeed:'UT-3', note:'Fed from UT-3 (Grandbridge). Primary for chains 12E, 12H, 12K' },
  { id:'UTD3-2', label:'UTD3-2', rating:'1200A 38kV 25KAIC', feeder:'12', utilFeed:'UT-3', note:'Fed from UT-3 (Grandbridge). Ring backfeed for 12G, 12J, 12N' },
];

function generateGenTree(s) {
  return { id:`GEN-${s}`, label:`GEN-${s}`, type:'generator', rating:'3000KW 480V', defaultState:'off', isGenSource:true, atsId:`ATS-${s}`, children:[] };
}

function flattenTree(node, parentId, depth) {
  if (parentId === undefined) parentId = null;
  if (depth === undefined) depth = 0;
  var r = [{ id:node.id, label:node.label, type:node.type, rating:node.rating, defaultState:node.defaultState,
    parentId:parentId, depth:depth, childIds:(node.children||[]).map(function(c){return c.id;}),
    isUtilitySource:node.isUtilitySource||false, isGenSource:node.isGenSource||false,
    genSourceId:node.genSourceId||null, atsId:node.atsId||null,
    bypassSourceId:node.bypassSourceId||null, isKirkKeyBypass:node.isKirkKeyBypass||false,
    utdSourceId:node.utdSourceId||null, utdRingIds:node.utdRingIds||null }];
  (node.children||[]).forEach(function(c){ r.push.apply(r, flattenTree(c, node.id, depth+1)); });
  return r;
}

function computeEnergized(flatNodes, sw, utd) {
  var nm = {};
  flatNodes.forEach(function(n){ nm[n.id] = n; });
  var energized = {};
  function check(id) {
    if (energized[id] !== undefined) return energized[id];
    var node = nm[id];
    if (!node) { energized[id] = false; return false; }
    var st = (sw[id] !== undefined ? sw[id] : node.defaultState);
    if (node.isGenSource) { energized[id] = st === 'on'; return energized[id]; }
    if (!node.parentId) {
      var utdOn = true;
      if (node.utdRingIds && node.utdRingIds.length > 0) {
        utdOn = node.utdRingIds.some(function(u){ return (utd[u] !== undefined ? utd[u] : 'on') === 'on'; });
      } else if (node.utdSourceId) {
        utdOn = (utd[node.utdSourceId] !== undefined ? utd[node.utdSourceId] : 'on') === 'on';
      }
      energized[id] = st === 'on' && utdOn; return energized[id];
    }
    if (node.type === 'ats') {
      energized[id] = st === 'on' ? check(node.parentId) : (node.genSourceId ? check(node.genSourceId) : false);
      return energized[id];
    }
    if (node.bypassSourceId) {
      energized[id] = st === 'on' && (check(node.parentId) || check(node.bypassSourceId));
      return energized[id];
    }
    energized[id] = st === 'on' && check(node.parentId);
    return energized[id];
  }
  flatNodes.forEach(function(n){ check(n.id); });
  return energized;
}

// STORAGE + CHANGE LOG
// ═══════════════════════════════════════════════════════════════════
var STORAGE_KEY   = 'ascent-tor1-sld-v2';
var CHANGELOG_KEY = 'ascent-tor1-changelog-v2';
var MAX_LOG       = 500;

function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch(e) {}
}
function loadLog() {
  try { return JSON.parse(localStorage.getItem(CHANGELOG_KEY) || '[]'); } catch(e) { return []; }
}
function appendLog(entry) {
  try {
    var log = loadLog();
    log.unshift(entry);
    if (log.length > MAX_LOG) log.length = MAX_LOG;
    localStorage.setItem(CHANGELOG_KEY, JSON.stringify(log));
  } catch(e) {}
}
function clearLog() {
  try { localStorage.removeItem(CHANGELOG_KEY); } catch(e) {}
}
function logToggle(blockId, componentId, from, to) {
  appendLog({ ts:new Date().toISOString(), type:'toggle', blockId:blockId, componentId:componentId, from:from, to:to });
}
function logUtd(utdId, from, to) {
  appendLog({ ts:new Date().toISOString(), type:'utd', utdId:utdId, from:from, to:to });
}

// ═══════════════════════════════════════════════════════════════════
// CHANGE LOG MODAL
// ═══════════════════════════════════════════════════════════════════
function ChangeLogModal({ onClose }) {
  const [log, setLog] = useState([]);
  const [filter, setFilter] = useState('');

  useEffect(() => { setLog(loadLog()); }, []);

  const filtered = filter
    ? log.filter(e => JSON.stringify(e).toLowerCase().includes(filter.toLowerCase()))
    : log;

  function fmtTime(iso) {
    try {
      var d = new Date(iso);
      var date = d.toLocaleDateString('en-CA');
      var time = d.toLocaleTimeString('en-CA', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
      return date + ' ' + time;
    } catch(err) { return iso; }
  }

  function handleClear() {
    if (!window.confirm('Clear all change log entries?')) return;
    clearLog();
    setLog([]);
  }

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={function(e){ e.stopPropagation(); }}>
        <div className="modal-header">
          <div>
            <div style={{fontWeight:700, fontSize:15, color:'#0f172a'}}>Change Log</div>
            <div style={{fontSize:11, color:'#64748b', marginTop:2}}>
              {filtered.length} of {log.length} entries stored in browser — persists across sessions
            </div>
          </div>
          <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
            <input
              placeholder="Filter..."
              value={filter}
              onChange={function(e){ setFilter(e.target.value); }}
              style={{padding:'5px 10px', borderRadius:6, border:'1px solid #e2e8f0',
                fontSize:12, fontFamily:"'JetBrains Mono',monospace",
                outline:'none', width:160, color:'#0f172a'}}
            />
            <button onClick={handleClear} style={{padding:'5px 10px', borderRadius:6,
              border:'1px solid #fecaca', background:'#fef2f2', color:'#dc2626',
              fontSize:11, cursor:'pointer', fontFamily:'inherit'}}>Clear log</button>
            <button onClick={onClose} style={{padding:'5px 10px', borderRadius:6,
              border:'1px solid #e2e8f0', background:'#f8fafc', color:'#64748b',
              fontSize:11, cursor:'pointer', fontFamily:'inherit'}}>Close</button>
          </div>
        </div>
        <div className="modal-body">
          {filtered.length === 0 ? (
            <div style={{display:'flex', alignItems:'center', justifyContent:'center',
              height:120, color:'#94a3b8', fontSize:13}}>
              No entries yet — toggle any component or UTD to start logging
            </div>
          ) : (
            <table className="log-table">
              <thead>
                <tr>
                  {['Timestamp','Type','Block / UTD','Component','From','To'].map(function(h){
                    return <th key={h}>{h}</th>;
                  })}
                </tr>
              </thead>
              <tbody>
                {filtered.map(function(e, i) {
                  var isToggle = e.type === 'toggle';
                  var toOn = e.to === 'on';
                  var fromOn = e.from === 'on';
                  return (
                    <tr key={i}>
                      <td style={{color:'#475569', whiteSpace:'nowrap'}}>{fmtTime(e.ts)}</td>
                      <td>
                        <span style={{fontSize:9, fontWeight:700, padding:'2px 6px', borderRadius:4,
                          background: isToggle ? '#eff6ff' : '#f0fdf4',
                          color:      isToggle ? '#2563eb' : '#16a34a',
                          letterSpacing:'0.04em'}}>
                          {isToggle ? 'TOGGLE' : 'UTD'}
                        </span>
                      </td>
                      <td style={{fontWeight:600, color:'#0f172a'}}>{isToggle ? e.blockId : e.utdId}</td>
                      <td style={{color:'#334155', fontSize:9}}>{isToggle ? e.componentId : '—'}</td>
                      <td>
                        <span style={{fontSize:9, fontWeight:700, padding:'2px 6px', borderRadius:4,
                          background: fromOn ? '#f0fdf4' : '#fef2f2',
                          color:      fromOn ? '#16a34a' : '#dc2626'}}>
                          {(e.from || '').toUpperCase()}
                        </span>
                      </td>
                      <td>
                        <span style={{fontSize:9, fontWeight:700, padding:'2px 6px', borderRadius:4,
                          background: toOn ? '#f0fdf4' : '#fef2f2',
                          color:      toOn ? '#16a34a' : '#dc2626'}}>
                          {(e.to || '').toUpperCase()}
                        </span>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// NODE BOX
// ═══════════════════════════════════════════════════════════════════
function NodeBox({ node, isEnergized, switchState, onToggle, compact }) {
  if (compact === undefined) compact = false;
  var [tip, setTip] = useState(false);
  var isOn = switchState === 'on';
  var isBreaker = node.type === 'breaker';
  var cls = 'node' + (isEnergized ? ' energized' : isOn ? ' warm' : '') + (compact ? ' compact' : '');
  var dotCls = 'node-dot' + (isEnergized ? ' energized' : isOn ? ' warm' : '');

  return (
    <div className="tip-wrap">
      <button className={cls}
        onClick={function(){ onToggle && onToggle(node.id); }}
        onMouseEnter={function(){ setTip(true); }}
        onMouseLeave={function(){ setTip(false); }}>
        <div className={dotCls + (isEnergized ? ' pulse' : '')} />
        <NodeIcon type={node.type} cls="node-icon" />
        <span className="node-label">{node.label}</span>
        {isBreaker && <span className={'node-state ' + (isOn ? 'closed' : 'open')}>{isOn ? 'CLOSED' : 'OPEN'}</span>}
      </button>
      {tip && (
        <div className="tip-box">
          <div className="tip-title">{node.label}</div>
          <div className="tip-type">{node.type}</div>
          <div className="tip-rating">{node.rating}</div>
          <div className={'tip-state ' + (isEnergized ? 'energized' : 'dead')}>
            <IcoZap c="node-icon" />
            {isEnergized ? 'Energized' : 'De-energized'}
          </div>
        </div>
      )}
    </div>
  );
}

function WireV({ on, h }) {
  if (h === undefined) h = 16;
  return <div className={'wire-v ' + (on ? 'on' : '')} style={{height:h}} />;
}

// ═══════════════════════════════════════════════════════════════════
// TREE BRANCH
// ═══════════════════════════════════════════════════════════════════
function findNode(tree, id) {
  if (!tree) return null;
  if (tree.id === id) return tree;
  var children = tree.children || [];
  for (var i = 0; i < children.length; i++) {
    var r = findNode(children[i], id);
    if (r) return r;
  }
  return null;
}

function TreeBranch({ node, em, sw, onToggle, depth }) {
  if (depth === undefined) depth = 0;
  var isE = em[node.id] || false;
  var st = sw[node.id] !== undefined ? sw[node.id] : node.defaultState;
  var children = node.children || [];
  var compact = depth >= 3;
  var wireOn = isE;

  if (node.isKirkKeyBypass) {
    return (
      <div className="branch">
        <div className="kirk-label">KIRK KEY BYPASS</div>
        <div className="kirk-box">
          <NodeBox node={node} isEnergized={isE} switchState={st} onToggle={onToggle} compact={true} />
        </div>
      </div>
    );
  }

  return (
    <div className="branch">
      {depth > 0 && <WireV on={isE} />}
      <NodeBox node={node} isEnergized={isE} switchState={st} onToggle={onToggle} compact={compact} />
      {children.length > 0 && (
        <div className="branch">
          <WireV on={isE} />
          {children.length === 1 ? (
            <TreeBranch node={children[0]} em={em} sw={sw} onToggle={onToggle} depth={depth+1} />
          ) : (
            <div style={{position:'relative', display:'flex', alignItems:'flex-start'}}>
              <div className={'wire-h ' + (wireOn ? 'on' : '')} style={{position:'absolute', top:0, left:0, right:0, height:1}} />
              <div style={{display:'flex', gap:4, flexWrap:children.length > 6 ? 'wrap' : 'nowrap', justifyContent:'center', maxWidth:1000}}>
                {children.map(function(c) {
                  return (
                    <div key={c.id} className="branch-cell">
                      <TreeBranch node={c} em={em} sw={sw} onToggle={onToggle} depth={depth+1} />
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function MechBypassSection({ tree, em, sw, onToggle }) {
  var s = tree.id.replace('MVT-', '');
  var mechUps = findNode(tree, 'MECH-UPS-' + s);
  var mechMbp = findNode(tree, 'MECH-MBP-' + s);
  var kirk    = findNode(tree, 'MBP-52MUO-' + s);
  if (!mechUps || !mechMbp) return null;

  var upsE  = em[mechUps.id] || false;
  var kirkE = kirk ? (em[kirk.id] || false) : false;
  var mbpE  = em[mechMbp.id] || false;
  var upsState  = sw[mechUps.id] !== undefined ? sw[mechUps.id] : mechUps.defaultState;
  var kirkState = kirk ? (sw[kirk.id] !== undefined ? sw[kirk.id] : kirk.defaultState) : 'off';
  var mbpState  = sw[mechMbp.id] !== undefined ? sw[mechMbp.id] : mechMbp.defaultState;

  return (
    <div className="branch">
      <div style={{display:'flex', alignItems:'flex-end', gap:24}}>
        <div className="branch">
          <NodeBox node={mechUps} isEnergized={upsE} switchState={upsState} onToggle={onToggle} />
          <WireV on={upsE} h={24} />
        </div>
        {kirk && (
          <div className="branch">
            <div className="kirk-label">KIRK KEY BYPASS</div>
            <div className="kirk-box">
              <NodeBox node={kirk} isEnergized={kirkE} switchState={kirkState} onToggle={onToggle} compact={true} />
            </div>
            <WireV on={kirkE} h={24} />
          </div>
        )}
      </div>
      <div style={{position:'relative', width: kirk ? 160 : 80, height:12, display:'flex', alignItems:'center', justifyContent:'center'}}>
        <div className={'wire-h ' + (mbpE ? 'on' : '')} style={{position:'absolute', left:0, right:0, height:1}} />
        <div className={'wire-v ' + (mbpE ? 'on' : '')} style={{height:12, position:'absolute'}} />
      </div>
      <NodeBox node={mechMbp} isEnergized={mbpE} switchState={mbpState} onToggle={onToggle} />
      {mechMbp.children.length > 0 && (
        <div className="branch">
          <WireV on={mbpE} />
          <div style={{position:'relative', display:'flex', alignItems:'flex-start'}}>
            <div className={'wire-h ' + (mbpE ? 'on' : '')} style={{position:'absolute', top:0, left:0, right:0, height:1}} />
            <div style={{display:'flex', gap:4, flexWrap:'wrap', justifyContent:'center', maxWidth:900}}>
              {mechMbp.children.map(function(c) {
                return (
                  <div key={c.id} className="branch-cell">
                    <TreeBranch node={c} em={em} sw={sw} onToggle={onToggle} depth={4} />
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// FULL BLOCK DIAGRAM VIEW
// ═══════════════════════════════════════════════════════════════════
function BlockDiagramView({ blockId, allSw, utd, onToggle, onToggleUtd, onBack, onNav }) {
  var tree = useMemo(function(){ return generateBlockTree(blockId); }, [blockId]);
  var gen  = useMemo(function(){ return generateGenTree(blockId); }, [blockId]);
  var flat = useMemo(function(){ return flattenTree(tree).concat(flattenTree(gen)); }, [tree, gen]);

  var sw = useMemo(function() {
    var base = {};
    flat.forEach(function(n){ base[n.id] = n.defaultState; });
    var saved = allSw[blockId] || {};
    Object.keys(saved).forEach(function(k){ base[k] = saved[k]; });
    return base;
  }, [flat, allSw, blockId]);

  var em = useMemo(function(){ return computeEnergized(flat, sw, utd); }, [flat, sw, utd]);

  var totalE = flat.filter(function(n){ return em[n.id]; }).length;
  var pct = flat.length > 0 ? Math.round((totalE / flat.length) * 100) : 0;
  var atsState = sw['ATS-' + blockId] !== undefined ? sw['ATS-' + blockId] : 'on';
  var activeSrc = atsState === 'on' ? 'utility' : 'generator';
  var utdId = tree.utdSourceId;
  var utdOn = utdId ? ((utd[utdId] !== undefined ? utd[utdId] : 'on') === 'on') : true;
  var utdInfo = UTD_LOOPS.find(function(u){ return u.id === utdId; });

  var idx = BLOCKS.indexOf(blockId);
  var prev = idx > 0 ? BLOCKS[idx - 1] : null;
  var next = idx < BLOCKS.length - 1 ? BLOCKS[idx + 1] : null;

  var atsNode = tree.children[0];
  var msbNode = atsNode ? atsNode.children[0] : null;
  var mainCh  = msbNode ? (msbNode.children || []).filter(function(c){ return !c.id.startsWith('4B-52F14') && !c.isKirkKeyBypass; }) : [];
  var f4B     = msbNode ? (msbNode.children || []).find(function(c){ return c.id.startsWith('4B-52F14'); }) : null;

  function handle(cid) { onToggle(blockId, cid); }

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', background:'var(--bg)'}}>
      <div className="block-header">
        <div className="block-header-left">
          <button className="btn-back" onClick={onBack}><IcoBack c="node-icon" /> Back</button>
          <div className="divider-v" />
          <div>
            <div style={{fontWeight:700, fontSize:14}}>Power Block {blockId}</div>
            <div style={{fontSize:10, color:'var(--text3)'}}>LV One-Line Diagram — Optistax {blockId}</div>
          </div>
        </div>
        <div className="block-header-right">
          <div className="legend">
            <span><span className="legend-dot" style={{background:'var(--green)'}} /> Energized</span>
            <span><span className="legend-dot" style={{background:'var(--border2)'}} /> De-energized</span>
          </div>
          {utdInfo && (
            <button className={'utd-toggle ' + (utdOn ? 'on' : 'off')} onClick={function(){ onToggleUtd(utdId); }}>
              {utdInfo.label} ({utdInfo.utilFeed}): {utdOn ? 'ON' : 'OFF'}
            </button>
          )}
          <div className={'badge ' + (activeSrc === 'generator' ? 'amber' : 'green')}>
            <IcoZap c="node-icon" />
            {activeSrc === 'generator' ? 'GEN' : 'UTIL'} &middot; {totalE}/{flat.length} &mdash; {pct}%
          </div>
          <div style={{display:'flex', gap:4}}>
            {prev && <button className="btn-nav" onClick={function(){ onNav(prev); }}>&#8592; {prev}</button>}
            {next && <button className="btn-nav" onClick={function(){ onNav(next); }}>{next} &#8594;</button>}
          </div>
        </div>
      </div>

      <div className="diagram-wrap">
        <div className="diagram-inner">
          <div className="sources-row">
            <div className="source-col">
              <span className="source-label">Utility Source</span>
              <NodeBox node={tree} isEnergized={em[tree.id]} switchState={sw[tree.id] !== undefined ? sw[tree.id] : tree.defaultState} onToggle={handle} />
            </div>
            <div className="source-col">
              <span className="source-label">Gen Source</span>
              <NodeBox node={gen} isEnergized={em[gen.id]} switchState={sw[gen.id] !== undefined ? sw[gen.id] : gen.defaultState} onToggle={handle} />
            </div>
          </div>

          <WireV on={em[tree.id]} />
          {atsNode && (
            <div className="branch">
              <button className={'ats-btn ' + (atsState === 'on' ? 'util' : 'gen')} onClick={function(){ handle(atsNode.id); }}>
                {atsNode.label} | {atsState === 'on' ? '\u25C4 UTILITY' : '\u25BA GENERATOR'}
                <span className="ats-hint">(click to switch)</span>
              </button>
              <WireV on={em[atsNode.id]} />
            </div>
          )}

          {msbNode && (
            <div className="branch">
              <NodeBox node={msbNode} isEnergized={em[msbNode.id]} switchState={sw[msbNode.id] !== undefined ? sw[msbNode.id] : msbNode.defaultState} onToggle={handle} />
              <WireV on={em[msbNode.id]} />
              <div className={'bus-h ' + (em[msbNode.id] ? 'on' : 'off')} style={{width:'90%', maxWidth:1100}} />
              <div style={{display:'flex', gap:8, flexWrap:'wrap', justifyContent:'center', maxWidth:1300}}>
                {mainCh.map(function(c) {
                  return (
                    <div key={c.id} className="branch-cell">
                      <WireV on={em[msbNode.id]} />
                      <TreeBranch node={c} em={em} sw={sw} onToggle={handle} depth={1} />
                    </div>
                  );
                })}
                {f4B && (
                  <div className="branch-cell">
                    <WireV on={em[msbNode.id]} />
                    <NodeBox node={f4B} isEnergized={em[f4B.id]} switchState={sw[f4B.id] !== undefined ? sw[f4B.id] : f4B.defaultState} onToggle={handle} />
                    <WireV on={em[f4B.id]} />
                    <MechBypassSection tree={tree} em={em} sw={sw} onToggle={handle} />
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// DASHBOARD BLOCK CARD
// ═══════════════════════════════════════════════════════════════════
function BlockCard({ blockId, allSw, utd, onClick }) {
  var flat = useMemo(function() {
    var t = generateBlockTree(blockId);
    var g = generateGenTree(blockId);
    return flattenTree(t).concat(flattenTree(g));
  }, [blockId]);

  var sw = useMemo(function() {
    var base = {};
    flat.forEach(function(n){ base[n.id] = n.defaultState; });
    var saved = allSw[blockId] || {};
    Object.keys(saved).forEach(function(k){ base[k] = saved[k]; });
    return base;
  }, [flat, allSw, blockId]);

  var em = useMemo(function(){ return computeEnergized(flat, sw, utd); }, [flat, sw, utd]);
  var totalE = flat.filter(function(n){ return em[n.id]; }).length;
  var pct = flat.length > 0 ? Math.round((totalE / flat.length) * 100) : 0;
  var atsState = sw['ATS-' + blockId] !== undefined ? sw['ATS-' + blockId] : 'on';
  var src = atsState === 'on' ? 'UTIL' : 'GEN';
  var barColor = pct === 100 ? '#22c55e' : pct > 50 ? '#f59e0b' : pct > 0 ? '#ef4444' : '#e2e8f0';

  return (
    <button className="block-card" onClick={onClick}>
      <div className="block-card-top">
        <span className="block-card-id">{blockId}</span>
        <span className={'block-card-src ' + (src === 'GEN' ? 'gen' : 'util')}>{src}</span>
      </div>
      <div style={{display:'flex', alignItems:'flex-end', justifyContent:'space-between'}}>
        <span className="block-card-pct" style={{color:barColor}}>{pct}%</span>
        <span className="block-card-ratio">{totalE}/{flat.length}</span>
      </div>
      <div className="progress-bar">
        <div className="progress-fill" style={{width:pct+'%', backgroundColor:barColor}} />
      </div>
      <div className="block-card-utd">{BLOCK_UTD_SOURCE[blockId]}</div>
    </button>
  );
}

// ═══════════════════════════════════════════════════════════════════
// DASHBOARD VIEW
// ═══════════════════════════════════════════════════════════════════
function DashboardView({ allSw, utd, onToggleUtd, onSelectBlock }) {
  var [showLog, setShowLog] = useState(false);
  var [logCount, setLogCount] = useState(0);

  useEffect(function() {
    setLogCount(loadLog().length);
    var id = setInterval(function(){ setLogCount(loadLog().length); }, 3000);
    return function(){ clearInterval(id); };
  }, []);

  var stats = useMemo(function() {
    var tc = 0, te = 0;
    BLOCKS.forEach(function(b) {
      var t = generateBlockTree(b);
      var g = generateGenTree(b);
      var fl = flattenTree(t).concat(flattenTree(g));
      var sw = {};
      fl.forEach(function(n){ sw[n.id] = n.defaultState; });
      var saved = allSw[b] || {};
      Object.keys(saved).forEach(function(k){ sw[k] = saved[k]; });
      var em = computeEnergized(fl, sw, utd);
      tc += fl.length;
      te += fl.filter(function(n){ return em[n.id]; }).length;
    });
    return { tc:tc, te:te, pct: tc > 0 ? Math.round((te/tc)*100) : 0 };
  }, [allSw, utd]);

  return (
    <div className="page scrollable" style={{height:'100%', position:'relative'}}>
      {showLog && <ChangeLogModal onClose={function(){ setShowLog(false); }} />}

      <div className="dash-header">
        <div>
          <div className="dash-title">System Dashboard</div>
          <div className="dash-sub">ASCENT TOR1 &mdash; Phase 2 (11A&ndash;11J) &amp; Phase 3 (12A&ndash;12N)</div>
        </div>
        <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end', gap:8}}>
          <div>
            <div className="dash-pct-big">{stats.pct}%</div>
            <div className="dash-pct-sub">{stats.te}/{stats.tc} components energized</div>
          </div>
          <button onClick={function(){ setShowLog(true); }} style={{
            display:'flex', alignItems:'center', gap:6,
            padding:'5px 12px', borderRadius:7, border:'1px solid var(--border)',
            background:'white', fontSize:11, fontFamily:'inherit', cursor:'pointer',
            color:'#475569', transition:'all 0.15s', boxShadow:'var(--shadow-sm)'}}>
            <IcoLog c="node-icon" />
            Change Log
            {logCount > 0 && (
              <span style={{background:'#2563eb', color:'white', fontSize:9, fontWeight:700,
                padding:'1px 5px', borderRadius:9, fontFamily:"'JetBrains Mono',monospace"}}>
                {logCount}
              </span>
            )}
          </button>
        </div>
      </div>

      <div className="section-title">UTD Loop Status</div>
      <UtdBar utd={utd} onToggle={onToggleUtd} />

      <div className="stat-grid" style={{marginTop:20}}>
        {[
          { label:'Power Blocks',   val:BLOCKS.length,    color:'var(--green)' },
          { label:'Phase 2 Blocks', val:BLOCKS_11.length, color:'#60a5fa' },
          { label:'Phase 3 Blocks', val:BLOCKS_12.length, color:'#a78bfa' },
        ].map(function(s) {
          return (
            <div key={s.label} className="stat-card">
              <div className="stat-label">{s.label}</div>
              <div className="stat-value" style={{color:s.color}}>{s.val}</div>
            </div>
          );
        })}
      </div>

      <div className="section-title">Phase 2 &mdash; Feeder 11 (11A&ndash;11J)</div>
      <div className="block-grid" style={{marginBottom:24}}>
        {BLOCKS_11.map(function(b){ return <BlockCard key={b} blockId={b} allSw={allSw} utd={utd} onClick={function(){ onSelectBlock(b); }} />; })}
      </div>

      <div className="section-title">Phase 3 &mdash; Feeder 12 (12A&ndash;12N)</div>
      <div className="block-grid" style={{marginBottom:64}}>
        {BLOCKS_12.map(function(b){ return <BlockCard key={b} blockId={b} allSw={allSw} utd={utd} onClick={function(){ onSelectBlock(b); }} />; })}
      </div>

      <div className="dev-credit">
        <div className="dev-credit-inner">
          <div style={{fontWeight:600, color:'#64748b', fontSize:9, textTransform:'uppercase', letterSpacing:'0.1em', marginBottom:2}}>Developed by</div>
          <div style={{color:'#334155', fontWeight:500}}>Vishnu Ohri</div>
          <div style={{color:'#334155', fontWeight:500}}>Joshua O&#39;Connor Quinn</div>
        </div>
      </div>
    </div>
  );
}

// MV DISTRIBUTION VIEW

              </div>
              <div className="card-rating">{f.rating}</div>
              <div className="card-note">{f.note}</div>
              {f.status === 'active' && (
                <div style={{display:'flex', alignItems:'center', gap:4, marginTop:8, fontSize:10, color:'var(--green)', fontWeight:500}}>
                  <IcoZap c="node-icon" /> Energized
                </div>
              )}
            </div>
          );
        })}
      </div>

      {['UT-2','UT-1','UT-3','UT-4'].map(function(feed) {

        if (!sections.length) return null;
        var col = feedColors[feed] || '#94a3b8';

        var feederLabel = feed === 'UT-2' ? 'Phase 2 \u2014 Feeder 11 (11A\u201311J)' :

              padding:'6px 12px', borderRadius:8,
              background: col + '08', border:'1px solid ' + col + '33'}}>
              <div style={{width:10, height:10, borderRadius:2, background:col, flexShrink:0}} />
              <span style={{fontWeight:700, fontSize:12, color:col}}>{feed}</span>
              <span style={{fontSize:11, color:'var(--text3)'}}>&rarr; {feederLabel}</span>
            </div>
            <div className="mv-section-grid" style={{marginBottom:10}}>
              {sections.map(function(s) {
                return (
                  <div key={s.id} className={'card ' + (s.status === 'active' ? 'active' : 'future')}
                    style={{borderTop:'2px solid ' + col}}>
                    <div className="card-header">
                      <span className="card-title">{s.label}</span>
                      <div style={{display:'flex', gap:4}}>
                        <span className="tag feeder">F{s.feeder}</span>
                        <span style={{fontSize:9, fontWeight:600, padding:'2px 6px', borderRadius:4,
                          background: col + '15', color:col, border:'1px solid ' + col + '33'}}>
                          {feed}
                        </span>
                      </div>
                    </div>
                    <div className="card-rating">{s.rating}</div>
                    <div className="card-note">{s.note}</div>
                    {s.blocks.length > 0 && (
                      <div className="card-blocks">

                    <div key={ch.label} className="card active" style={{borderLeft:'2px solid ' + col}}>
                      <div className="card-header">
                        <span style={{fontWeight:700, fontSize:13}}>{ch.label}</span>
                        <span style={{fontSize:9, color:col, fontFamily:"'JetBrains Mono',monospace", fontWeight:600}}>{ch.source}</span>

                        {ch.blocks.map(function(b, i) {
                          return (

// ═══════════════════════════════════════════════════════════════════
// PHASE OVERVIEW — mini nodes per unit, zoomable/pannable
// ═══════════════════════════════════════════════════════════════════
function MiniNode({ node, isEnergized, switchState, onToggle, depth }) {
  if (depth === undefined) depth = 0;
  var [tip, setTip] = useState(false);
  var isOn = switchState === 'on';
  var isBreaker = node.type === 'breaker';

  var bg, border, dotBg;
  if (isEnergized) { bg='#f0fdf4'; border='#86efac'; dotBg='#22c55e'; }
  else if (isOn)   { bg='#fffbeb'; border='#fde68a'; dotBg='#f59e0b'; }
  else             { bg='#f8fafc'; border='#e2e8f0'; dotBg='#cbd5e1'; }

  var w = depth >= 3 ? 50 : 60;

  return (
    <div style={{position:'relative', display:'inline-block'}}
      onMouseEnter={function(){ setTip(true); }}
      onMouseLeave={function(){ setTip(false); }}>
      <button onClick={function(){ onToggle && onToggle(node.id); }} style={{
        position:'relative', display:'flex', flexDirection:'column', alignItems:'center',
        gap:2, borderRadius:6, border:'1px solid ' + border,
        background:bg, padding:depth>=3?'3px 4px':'4px 6px', width:w,
        cursor:'pointer', fontSize:8, fontFamily:"'JetBrains Mono',monospace",
        boxShadow:'0 1px 2px rgba(15,23,42,0.05)', transition:'all 0.15s'}}>
        <div style={{position:'absolute', top:-3, right:-3, width:7, height:7,
          borderRadius:'50%', background:dotBg, border:'1.5px solid white'}} />
        <NodeIcon type={node.type} cls="node-icon" />
        <span style={{color:isEnergized?'#334155':'#94a3b8', textAlign:'center', lineHeight:1.2, fontSize:7, fontWeight:500}}>{node.label}</span>
        {isBreaker && <span style={{fontSize:6.5, fontWeight:700, color:isOn?'#16a34a':'#dc2626'}}>{isOn?'CLOSED':'OPEN'}</span>}
      </button>
      {tip && (
        <div style={{position:'absolute', bottom:'calc(100% + 6px)', left:'50%', transform:'translateX(-50%)',
          zIndex:999, background:'white', border:'1px solid #e2e8f0', borderRadius:8,
          padding:'8px 10px', width:148, pointerEvents:'none',
          boxShadow:'0 4px 12px rgba(15,23,42,0.1)'}}>
          <div style={{fontWeight:600, fontSize:11, color:'#0f172a'}}>{node.label}</div>
          <div style={{fontSize:9, color:'#94a3b8', textTransform:'uppercase', marginTop:1}}>{node.type}</div>
          <div style={{fontSize:9, color:'#64748b', fontFamily:"'JetBrains Mono',monospace", marginTop:2}}>{node.rating}</div>
          <div style={{display:'flex', alignItems:'center', gap:4, marginTop:6, fontSize:10, fontWeight:500, color:isEnergized?'#16a34a':'#94a3b8'}}>
            <span style={{width:6, height:6, borderRadius:'50%', background:dotBg, display:'inline-block'}} />
            {isEnergized ? 'Energized' : 'De-energized'}
          </div>
        </div>
      )}
    </div>
  );
}

function MiniWire({ on, h }) {
  if (h === undefined) h = 10;
  return <div style={{width:1, height:h, background:on?'rgba(22,163,74,0.5)':'#e2e8f0', flexShrink:0, transition:'background 0.3s'}} />;
}

function MiniBranch({ node, em, sw, onToggle, depth }) {
  if (depth === undefined) depth = 0;
  var isE = em[node.id] || false;
  var st = sw[node.id] !== undefined ? sw[node.id] : node.defaultState;
  var children = node.children || [];
  var wireColor = isE ? 'rgba(22,163,74,0.5)' : '#e2e8f0';

  if (node.isKirkKeyBypass) {
    return (
      <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
        <div style={{fontSize:6, color:'#d97706', marginBottom:2, fontFamily:"'JetBrains Mono',monospace", fontWeight:600}}>KIRK</div>
        <div style={{border:'1px dashed #fde68a', borderRadius:5, padding:2, background:'#fffbeb'}}>
          <MiniNode node={node} isEnergized={isE} switchState={st} onToggle={onToggle} depth={depth} />
        </div>
      </div>
    );
  }

  return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
      {depth > 0 && <MiniWire on={isE} />}
      <MiniNode node={node} isEnergized={isE} switchState={st} onToggle={onToggle} depth={depth} />
      {children.length > 0 && (
        <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
          <MiniWire on={isE} />
          {children.length === 1 ? (
            <MiniBranch node={children[0]} em={em} sw={sw} onToggle={onToggle} depth={depth+1} />
          ) : (
            <div style={{position:'relative', display:'flex', alignItems:'flex-start'}}>
              <div style={{position:'absolute', top:0, left:0, right:0, height:1, background:wireColor, transition:'background 0.3s'}} />
              <div style={{display:'flex', gap:3, flexWrap:children.length>7?'wrap':'nowrap', justifyContent:'center', maxWidth:800}}>
                {children.map(function(c) {
                  return (
                    <div key={c.id} style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                      <MiniBranch node={c} em={em} sw={sw} onToggle={onToggle} depth={depth+1} />
                    </div>
                  );
                })}
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function MiniMechBypass({ tree, em, sw, onToggle }) {
  var s = tree.id.replace('MVT-', '');
  var mechUps = findNode(tree, 'MECH-UPS-' + s);
  var mechMbp = findNode(tree, 'MECH-MBP-' + s);
  var kirk    = findNode(tree, 'MBP-52MUO-' + s);
  if (!mechUps || !mechMbp) return null;

  var upsE  = em[mechUps.id] || false;
  var kirkE = kirk ? (em[kirk.id] || false) : false;
  var mbpE  = em[mechMbp.id] || false;

  return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
      <div style={{display:'flex', alignItems:'flex-end', gap:12}}>
        <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
          <MiniNode node={mechUps} isEnergized={upsE} switchState={sw[mechUps.id]||mechUps.defaultState} onToggle={onToggle} depth={3} />
          <MiniWire on={upsE} h={12} />
        </div>
        {kirk && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
            <div style={{fontSize:6, color:'#d97706', marginBottom:2, fontFamily:"'JetBrains Mono',monospace", fontWeight:600}}>KIRK</div>
            <div style={{border:'1px dashed #fde68a', borderRadius:5, padding:2, background:'#fffbeb'}}>
              <MiniNode node={kirk} isEnergized={kirkE} switchState={sw[kirk.id]||kirk.defaultState} onToggle={onToggle} depth={4} />
            </div>
            <MiniWire on={kirkE} h={12} />
          </div>
        )}
      </div>
      <div style={{position:'relative', width:kirk?100:55, height:8, display:'flex', alignItems:'center', justifyContent:'center'}}>
        <div style={{position:'absolute', left:0, right:0, height:1, background:mbpE?'rgba(22,163,74,0.5)':'#e2e8f0'}} />
        <div style={{position:'absolute', width:1, height:8, top:0, background:mbpE?'rgba(22,163,74,0.5)':'#e2e8f0'}} />
      </div>
      <MiniNode node={mechMbp} isEnergized={mbpE} switchState={sw[mechMbp.id]||mechMbp.defaultState} onToggle={onToggle} depth={3} />
      {mechMbp.children.length > 0 && (
        <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
          <MiniWire on={mbpE} />
          <div style={{position:'relative', display:'flex', alignItems:'flex-start'}}>
            <div style={{position:'absolute', top:0, left:0, right:0, height:1, background:mbpE?'rgba(22,163,74,0.5)':'#e2e8f0'}} />
            <div style={{display:'flex', gap:3, flexWrap:'wrap', justifyContent:'center', maxWidth:600}}>
              {mechMbp.children.map(function(c) {
                return (
                  <div key={c.id} style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                    <MiniBranch node={c} em={em} sw={sw} onToggle={onToggle} depth={4} />
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PhaseUnitColumn({ blockId, allSw, utd, onToggle, onOpenDetail, chainColor }) {
  var tree = useMemo(function(){ return generateBlockTree(blockId); }, [blockId]);
  var gen  = useMemo(function(){ return generateGenTree(blockId); }, [blockId]);
  var flat = useMemo(function(){ return flattenTree(tree).concat(flattenTree(gen)); }, [tree, gen]);

  var sw = useMemo(function() {
    var base = {};
    flat.forEach(function(n){ base[n.id] = n.defaultState; });
    var saved = allSw[blockId] || {};
    Object.keys(saved).forEach(function(k){ base[k] = saved[k]; });
    return base;
  }, [flat, allSw, blockId]);

  var em = useMemo(function(){ return computeEnergized(flat, sw, utd); }, [flat, sw, utd]);

  var totalE = flat.filter(function(n){ return em[n.id]; }).length;
  var pct = flat.length > 0 ? Math.round((totalE / flat.length) * 100) : 0;
  var atsState = sw['ATS-' + blockId] !== undefined ? sw['ATS-' + blockId] : 'on';
  var src = atsState === 'on' ? 'UTIL' : 'GEN';
  var barCol = pct === 100 ? '#22c55e' : pct > 50 ? '#f59e0b' : pct > 0 ? '#ef4444' : '#e2e8f0';

  var atsNode = tree.children[0];
  var msbNode = atsNode ? atsNode.children[0] : null;
  var mainCh  = msbNode ? (msbNode.children || []).filter(function(c){ return !c.id.startsWith('4B-52F14') && !c.isKirkKeyBypass; }) : [];
  var f4B     = msbNode ? (msbNode.children || []).find(function(c){ return c.id.startsWith('4B-52F14'); }) : null;
  var wireOn  = em[msbNode ? msbNode.id : ''] || false;

  function handle(cid) { onToggle(blockId, cid); }

  return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center',
      background:'white', border:'2px solid ' + chainColor + '22',
      borderRadius:10, padding:'8px 6px', minWidth:0, width:'100%',
      boxShadow:'0 1px 4px rgba(15,23,42,0.06)'}}>
      <div style={{width:'100%', marginBottom:6}}>
        <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:3}}>
          <span style={{fontFamily:"'JetBrains Mono',monospace", fontWeight:700, fontSize:12, color:'#0f172a'}}>{blockId}</span>
          <div style={{display:'flex', gap:3, alignItems:'center'}}>
            <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:8, fontWeight:600, padding:'1px 5px', borderRadius:3,
              background:src==='GEN'?'#fffbeb':'#f0fdf4', color:src==='GEN'?'#d97706':'#16a34a'}}>{src}</span>
            <button onClick={function(){ onOpenDetail(blockId); }} style={{fontSize:8, padding:'1px 5px', borderRadius:3,
              border:'1px solid #e2e8f0', background:'#f8fafc', color:'#64748b',
              fontFamily:"'JetBrains Mono',monospace", cursor:'pointer'}}>detail &rarr;</button>
          </div>
        </div>
        <div style={{height:3, background:'#f1f5f9', borderRadius:2, overflow:'hidden'}}>
          <div style={{height:'100%', width:pct+'%', background:barCol, borderRadius:2, transition:'width 0.5s'}} />
        </div>
        <div style={{display:'flex', justifyContent:'space-between', marginTop:2}}>
          <span style={{fontSize:7.5, color:'#94a3b8', fontFamily:"'JetBrains Mono',monospace"}}>{BLOCK_UTD_SOURCE[blockId]}</span>
          <span style={{fontSize:7.5, color:barCol, fontFamily:"'JetBrains Mono',monospace", fontWeight:600}}>{pct}%</span>
        </div>
      </div>

      <div style={{display:'flex', flexDirection:'column', alignItems:'center', width:'100%'}}>
        <div style={{display:'flex', gap:16, alignItems:'flex-start', marginBottom:2}}>
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:2}}>
            <span style={{fontSize:7, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.08em'}}>UTIL</span>
            <MiniNode node={tree} isEnergized={em[tree.id]} switchState={sw[tree.id]||tree.defaultState} onToggle={handle} depth={0} />
          </div>
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:2}}>
            <span style={{fontSize:7, color:'#94a3b8', textTransform:'uppercase', letterSpacing:'0.08em'}}>GEN</span>
            <MiniNode node={gen} isEnergized={em[gen.id]} switchState={sw[gen.id]||gen.defaultState} onToggle={handle} depth={0} />
          </div>
        </div>

        <MiniWire on={em[tree.id]} />
        {atsNode && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
            <button onClick={function(){ handle(atsNode.id); }} style={{
              display:'flex', alignItems:'center', gap:4, padding:'3px 8px', borderRadius:5,
              border:'1px solid', fontFamily:"'JetBrains Mono',monospace", fontSize:8, fontWeight:500, cursor:'pointer',
              borderColor:atsState==='on'?'#86efac':'#fde68a',
              color:       atsState==='on'?'#16a34a':'#d97706',
              background:  atsState==='on'?'#f0fdf4':'#fffbeb'}}>
              {atsNode.label} | {atsState==='on'?'\u25C4 UTIL':'\u25BA GEN'}
            </button>
            <MiniWire on={em[atsNode.id]} />
          </div>
        )}

        {msbNode && (
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', width:'100%'}}>
            <MiniNode node={msbNode} isEnergized={em[msbNode.id]} switchState={sw[msbNode.id]||msbNode.defaultState} onToggle={handle} depth={1} />
            <MiniWire on={wireOn} />
            <div style={{height:2, width:'90%', background:wireOn?'rgba(22,163,74,0.45)':'#e2e8f0', borderRadius:1, marginBottom:2, transition:'background 0.3s'}} />
            <div style={{display:'flex', gap:3, flexWrap:'wrap', justifyContent:'center', width:'100%'}}>
              {mainCh.map(function(c) {
                return (
                  <div key={c.id} style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                    <MiniWire on={wireOn} />
                    <MiniBranch node={c} em={em} sw={sw} onToggle={handle} depth={1} />
                  </div>
                );
              })}
              {f4B && (
                <div style={{display:'flex', flexDirection:'column', alignItems:'center'}}>
                  <MiniWire on={wireOn} />
                  <MiniNode node={f4B} isEnergized={em[f4B.id]} switchState={sw[f4B.id]||f4B.defaultState} onToggle={handle} depth={1} />
                  <MiniWire on={em[f4B.id]} />
                  <MiniMechBypass tree={tree} em={em} sw={sw} onToggle={handle} />
                </div>
              )}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function PhaseOverview({ phase, allSw, utd, onToggleUtd, onToggle, onOpenDetail }) {
  var [zoom, setZoom] = useState(1);
  var [pan, setPan] = useState({ x:0, y:0 });
  var [dragging, setDragging] = useState(false);
  var dragRef = useRef(null);
  var wrapRef = useRef(null);

  var blocks = phase === '11' ? BLOCKS_11 : BLOCKS_12;
  var chains = PHASE_CHAINS[phase] || [];
  var phaseName = phase === '11' ? 'Phase 2 \u2014 Feeder 11' : 'Phase 3 \u2014 Feeder 12';
  var phaseUtds = UTD_LOOPS.filter(function(u){ return u.feeder === phase; });

  useEffect(function() {
    var el = wrapRef.current;
    if (!el) return;
    function handleWheel(e) {
      e.preventDefault();
      var delta = e.deltaY > 0 ? 0.9 : 1.1;
      setZoom(function(z){ return Math.max(0.15, Math.min(3, z * delta)); });
    }
    el.addEventListener('wheel', handleWheel, { passive:false });
    return function(){ el.removeEventListener('wheel', handleWheel); };
  }, []);

  function onMouseDown(e) {
    if (e.button !== 0) return;
    setDragging(true);
    dragRef.current = { mx:e.clientX, my:e.clientY, px:pan.x, py:pan.y };
  }
  function onMouseMove(e) {
    if (!dragging || !dragRef.current) return;
    setPan({ x: dragRef.current.px + (e.clientX - dragRef.current.mx), y: dragRef.current.py + (e.clientY - dragRef.current.my) });
  }
  function onMouseUp() { setDragging(false); }

  var stats = useMemo(function() {
    var tc = 0, te = 0;
    blocks.forEach(function(b) {
      var t = generateBlockTree(b); var g = generateGenTree(b);
      var fl = flattenTree(t).concat(flattenTree(g));
      var sw = {}; fl.forEach(function(n){ sw[n.id] = n.defaultState; });
      var saved = allSw[b] || {}; Object.keys(saved).forEach(function(k){ sw[k] = saved[k]; });
      var em = computeEnergized(fl, sw, utd);
      tc += fl.length; te += fl.filter(function(n){ return em[n.id]; }).length;
    });
    return { tc:tc, te:te, pct: tc>0 ? Math.round((te/tc)*100) : 0 };
  }, [allSw, utd, blocks]);

  var ZOOM_PRESETS = [0.25, 0.5, 0.75, 1, 1.25, 1.5];

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100%', background:'#f8fafc', overflow:'hidden'}}>
      {/* Toolbar */}
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'8px 16px', background:'white', borderBottom:'1px solid #e2e8f0',
        flexShrink:0, gap:12, flexWrap:'wrap'}}>
        <div style={{display:'flex', alignItems:'center', gap:12}}>
          <div>
            <div style={{fontWeight:700, fontSize:14, color:'#0f172a'}}>{phaseName}</div>
            <div style={{fontSize:11, color:'#64748b', marginTop:1}}>{blocks.length} power blocks &bull; {stats.te}/{stats.tc} components energized</div>
          </div>
          <div style={{fontFamily:"'JetBrains Mono',monospace", fontWeight:700, fontSize:22,
            color:stats.pct===100?'#16a34a':stats.pct>50?'#d97706':'#dc2626',
            letterSpacing:'-0.02em'}}>{stats.pct}%</div>
        </div>
        <div style={{display:'flex', gap:6, flexWrap:'wrap'}}>
          {phaseUtds.map(function(u) {
            var on = (utd[u.id] !== undefined ? utd[u.id] : 'on') === 'on';
            return (
              <button key={u.id} onClick={function(){ onToggleUtd(u.id); }} style={{
                display:'flex', alignItems:'center', gap:5, padding:'4px 10px', borderRadius:6,
                border:'1px solid', fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:500,
                cursor:'pointer', transition:'all 0.18s',
                borderColor:on?'#86efac':'#fecaca', background:on?'#f0fdf4':'#fef2f2', color:on?'#16a34a':'#dc2626'}}>
                <span style={{width:6, height:6, borderRadius:'50%', background:on?'#22c55e':'#ef4444'}} />
                {u.label}
                <span style={{fontSize:8, padding:'0 2px', color:on?'#15803d':'#b91c1c', fontWeight:700}}>({u.utilFeed})</span>
                <span style={{fontSize:8, fontWeight:700, padding:'1px 4px', borderRadius:3,
                  background:on?'#bbf7d0':'#fecaca', color:on?'#15803d':'#b91c1c'}}>{on?'ON':'OFF'}</span>
              </button>
            );
          })}
        </div>
        <div style={{display:'flex', alignItems:'center', gap:6}}>
          <div style={{display:'flex', gap:2}}>
            {ZOOM_PRESETS.map(function(z) {
              var active = Math.abs(zoom - z) < 0.01;
              return (
                <button key={z} onClick={function(){ setZoom(z); }} style={{
                  padding:'3px 7px', borderRadius:4,
                  border:'1px solid ' + (active?'#86efac':'#e2e8f0'),
                  fontFamily:"'JetBrains Mono',monospace", fontSize:10, fontWeight:500,
                  cursor:'pointer', background:active?'#f0fdf4':'white', color:active?'#16a34a':'#64748b'}}>
                  {Math.round(z*100)}%
                </button>
              );
            })}
          </div>
          <button onClick={function(){ setZoom(1); setPan({x:0,y:0}); }} style={{
            padding:'3px 8px', borderRadius:4, border:'1px solid #e2e8f0',
            fontSize:10, color:'#64748b', cursor:'pointer', background:'white', fontFamily:'inherit'}}>
            Reset
          </button>
        </div>
      </div>

      {/* Chain legend */}
      <div style={{display:'flex', gap:8, padding:'5px 16px', background:'white',
        borderBottom:'1px solid #e2e8f0', flexShrink:0, flexWrap:'wrap', alignItems:'center'}}>
        {chains.map(function(ch, i) {
          return (
            <div key={i} style={{display:'flex', alignItems:'center', gap:5, fontSize:10, color:'#475569'}}>
              <div style={{width:12, height:3, background:ch.color, borderRadius:2, flexShrink:0}} />
              <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:9, fontWeight:500}}>
                {ch.utd}({ch.utilFeed}) [{ch.blocks.join('\u2192')}] \u2192 {ch.ring}
              </span>
            </div>
          );
        })}
        <div style={{marginLeft:'auto', fontSize:9, color:'#94a3b8'}}>Scroll to zoom &bull; Drag to pan</div>
      </div>

      {/* Canvas */}
      <div ref={wrapRef}
        style={{flex:1, overflow:'hidden', position:'relative', cursor:dragging?'grabbing':'grab', userSelect:'none'}}
        onMouseDown={onMouseDown} onMouseMove={onMouseMove} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
        <div style={{
          position:'absolute',
          transform:'translate(' + pan.x + 'px,' + pan.y + 'px) scale(' + zoom + ')',
          transformOrigin:'top left',
          padding:24}}>
          <div style={{display:'flex', gap:14, alignItems:'flex-start'}}>
            {chains.map(function(ch, ci) {
              return (
                <div key={ci} style={{display:'flex', flexDirection:'column', gap:0}}>
                  <div style={{display:'flex', alignItems:'center', gap:6, marginBottom:6,
                    padding:'4px 8px', borderRadius:6,
                    background:ch.color+'10', border:'1px solid '+ch.color+'33'}}>
                    <div style={{width:10, height:10, borderRadius:2, background:ch.color, flexShrink:0}} />
                    <span style={{fontFamily:"'JetBrains Mono',monospace", fontSize:9, fontWeight:600, color:ch.color}}>{ch.utd}</span>
                    <span style={{fontSize:8, padding:'1px 5px', borderRadius:3,
                      background:ch.color+'18', color:ch.color, fontWeight:700,
                      fontFamily:"'JetBrains Mono',monospace"}}>{ch.utilFeed}</span>
                    <span style={{fontSize:8, color:'#94a3b8'}}>&rarr; ring &rarr; {ch.ring}</span>
                  </div>
                  <div style={{height:2, background:'linear-gradient(90deg,'+ch.color+'99 0%,'+ch.color+'22 100%)', borderRadius:1, marginBottom:4}} />
                  <div style={{display:'flex', gap:6, alignItems:'flex-start'}}>
                    {ch.blocks.map(function(b, bi) {
                      return (
                        <div key={b} style={{display:'flex', flexDirection:'column', alignItems:'center', gap:0}}>
                          <div style={{fontSize:7, color:ch.color, fontFamily:"'JetBrains Mono',monospace", marginBottom:2, fontWeight:600}}>
                            {bi===0 ? '\u2193 '+ch.utd : '\u2193 '+ch.blocks[bi-1]}
                          </div>
                          <PhaseUnitColumn
                            blockId={b} allSw={allSw} utd={utd}
                            onToggle={onToggle} onOpenDetail={onOpenDetail}
                            chainColor={ch.color} />
                          {bi === ch.blocks.length - 1 && (
                            <div style={{fontSize:7, color:ch.color, fontFamily:"'JetBrains Mono',monospace", marginTop:2, fontWeight:600, opacity:0.7}}>
                              \u2191 {ch.ring}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════
function App() {
  var [view,  setView]  = useState('dashboard');
  var [block, setBlock] = useState(null);
  var [allSw, setAllSw] = useState({});
  var [utd,   setUtd]   = useState(function() {
    var s = {};
    UTD_LOOPS.forEach(function(u){ s[u.id] = 'on'; });
    return s;
  });

  useEffect(function() {
    var saved = loadState();
    if (saved.switches) setAllSw(saved.switches);
    if (saved.utd) setUtd(saved.utd);
  }, []);

  var saveTimer = useRef(null);
  useEffect(function() {
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(function(){ saveState({ switches:allSw, utd:utd }); }, 800);
  }, [allSw, utd]);

  var handleToggle = useCallback(function(blockId, cid) {
    if (!blockId || !cid) return;
    setAllSw(function(prev) {
      var bs = prev[blockId] || {};
      var tree = generateBlockTree(blockId);
      var gen  = generateGenTree(blockId);
      var flat = flattenTree(tree).concat(flattenTree(gen));
      var base = {};
      flat.forEach(function(n){ base[n.id] = n.defaultState; });
      Object.keys(bs).forEach(function(k){ base[k] = bs[k]; });
      var cur  = base[cid] !== undefined ? base[cid] : 'on';
      var next = cur === 'on' ? 'off' : 'on';
      logToggle(blockId, cid, cur, next);
      var newBs = {};
      Object.keys(bs).forEach(function(k){ newBs[k] = bs[k]; });
      newBs[cid] = next;
      var result = {};
      Object.keys(prev).forEach(function(k){ result[k] = prev[k]; });
      result[blockId] = newBs;
      return result;
    });
  }, []);

  var handleToggleUtd = useCallback(function(uid) {
    setUtd(function(prev) {
      var cur  = prev[uid] !== undefined ? prev[uid] : 'on';
      var next = cur === 'on' ? 'off' : 'on';
      logUtd(uid, cur, next);
      var result = {};
      Object.keys(prev).forEach(function(k){ result[k] = prev[k]; });
      result[uid] = next;
      return result;
    });
  }, []);

  var handleSelectBlock = useCallback(function(b) {
    setBlock(b);
    setView('block');
  }, []);

  var handleNav = useCallback(function(b) {
    setBlock(b);
  }, []);

  var NAV_TABS = [
    { key:'dashboard', label:'Dashboard', Icon:IcoGrid   },
    { key:'phase2',    label:'Phase 2',   Icon:IcoLayers },
    { key:'phase3',    label:'Phase 3',   Icon:IcoLayers },
    { key:'mv',        label:'MV Dist.',  Icon:IcoZap    },
  ];

  return (
    <div style={{display:'flex', flexDirection:'column', height:'100vh', background:'var(--bg)', color:'var(--text)'}}>
      {view !== 'block' && (
        <nav className="navbar">
          <div className="nav-brand">
            <div className="nav-logo"><IcoZap c="node-icon" /></div>
            <span className="nav-title">ASCENT TOR1</span>
            <span className="nav-sub">54MW &bull; 24 Power Blocks</span>
          </div>
          <div className="nav-tabs">
            {NAV_TABS.map(function(t) {
              return (
                <button key={t.key} className={'nav-tab ' + (view === t.key ? 'active' : '')} onClick={function(){ setView(t.key); }}>
                  <t.Icon c="node-icon" />
                  {t.label}
                </button>
              );
            })}
          </div>
        </nav>
      )}

      <div style={{flex:1, overflow:'hidden', display:'flex', flexDirection:'column'}}>
        {view === 'dashboard' && (
          <DashboardView allSw={allSw} utd={utd} onToggleUtd={handleToggleUtd} onSelectBlock={handleSelectBlock} />
        )}
        {view === 'phase2' && (
          <PhaseOverview phase="11" allSw={allSw} utd={utd} onToggleUtd={handleToggleUtd} onToggle={handleToggle} onOpenDetail={handleSelectBlock} />
        )}
        {view === 'phase3' && (
          <PhaseOverview phase="12" allSw={allSw} utd={utd} onToggleUtd={handleToggleUtd} onToggle={handleToggle} onOpenDetail={handleSelectBlock} />
        )}
        {view === 'mv' && (
          <MVView onSelectBlock={handleSelectBlock} />
        )}
        {view === 'block' && block && (
          <BlockDiagramView
            blockId={block} allSw={allSw} utd={utd}
            onToggle={handleToggle} onToggleUtd={handleToggleUtd}
            onBack={function(){ setView('dashboard'); }} onNav={handleNav} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
